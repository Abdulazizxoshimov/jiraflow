name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployments/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  deploy:
    name: Deploy to production
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/jiraflow

            # Save current image tag for rollback
            PREVIOUS_IMAGE=$(docker inspect --format='{{index .Image}}' jiraflow-app-1 2>/dev/null || echo "")

            # Pull latest image for the app service only
            docker compose -f deployments/docker-compose.yml pull app

            # Rolling restart — zero-downtime for stateless app
            docker compose -f deployments/docker-compose.yml up -d --no-deps --force-recreate app

            # Wait for health check to pass (up to 60s)
            echo "Waiting for health check..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "Health check passed"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "Health check failed — rolling back"
                if [ -n "$PREVIOUS_IMAGE" ]; then
                  docker compose -f deployments/docker-compose.yml up -d --no-deps --force-recreate app
                fi
                exit 1
              fi
              sleep 5
            done

            # Smoke tests
            curl -sf http://localhost:8080/health || exit 1
            curl -sf http://localhost:8080/ready || true

            # Reload nginx in case config changed
            docker compose -f deployments/docker-compose.yml exec -T nginx nginx -s reload || true

            # Remove dangling images to free disk
            docker image prune -f

            echo "Deploy complete: $(date)"
